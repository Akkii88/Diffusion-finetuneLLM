# Training Configuration — LoRA Fine-Tuning on Stable Diffusion
# ================================================================
# IMPROVED CONFIG - Optimized for better quality & faster convergence

run_name: "LoRA Fine-tuning"

model:
  base_model: "runwayml/stable-diffusion-v1-5"
  revision: null
  variant: null

lora:
  # INCREASED from 16 to 32 - Higher rank captures more detail
  rank: 32
  # Adjusted alpha for better scaling balance  
  alpha: 64
  # Reduced dropout for less regularization
  dropout: 0.05
  # FIXED: Use only supported target modules (no GEGLU layers)
  target_modules:
    - "to_q"
    - "to_k"
    - "to_v"
    - "to_out.0"

dataset:
  # Default - will be overridden by Supabase dataset_id when training from UI
  dataset_path: "./data/domain_images"
  caption_column: "text"
  image_column: "image"
  # REDUCED to 384 for faster training while maintaining quality
  resolution: 384
  center_crop: true
  random_flip: true
  min_resolution: 256

training:
  output_dir: "./models/lora_weights"
  logging_dir: "./logs/training"
  seed: 42
  
  # INCREASED batch size for more stable gradients
  train_batch_size: 2
  gradient_accumulation_steps: 4      # Effective batch = 8
  
  # LOWERED learning rate for stable training with more steps
  learning_rate: 5.0e-5
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  adam_weight_decay: 1.0e-2
  max_grad_norm: 1.0
  
  # MORE steps for proper convergence
  lr_scheduler: "cosine"             # Cosine decay = smoother
  lr_warmup_steps: 100               # More warmup
  max_train_steps: 750                # More steps
  
  # Precision & Memory — MPS compatible
  mixed_precision: "no"               # MPS doesn't support fp16 autocast well
  gradient_checkpointing: true        # Saves memory
  use_xformers: false                 # Not available on MPS
  enable_cpu_offload: false
  
  # Checkpointing
  save_steps: 100
  checkpoints_total_limit: 3
  resume_from_checkpoint: null
  
  # Validation
  validation_prompt: "a luxury car, high quality, detailed, 8k, photorealistic, studio lighting"
  validation_negative_prompt: "low quality, blurry, distorted, deformed, ugly, bad anatomy, watermark, text"
  num_validation_images: 4
  validation_steps: 100
  
  # Logging
  log_every_n_steps: 10
  report_to: "tensorboard"

inference:
  num_inference_steps: 50
  guidance_scale: 7.5
  default_scheduler: "ddim"
  safety_check: true

evaluation:
  num_eval_images: 50
  fid_feature_layer: 2048
  clip_model: "openai/clip-vit-base-patch32"
  eval_prompts_file: "./data/eval_prompts.txt"
  results_output: "./evaluation_results.json"
